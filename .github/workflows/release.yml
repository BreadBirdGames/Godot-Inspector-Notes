name: Upload Addons ZIP

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(tr -d '\r\n' < .version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create ZIP
        run: |
          TAG="${{ steps.version.outputs.version }}"

          # Files from the repository root to include
          ROOT_FILES=(
            "README.md"
            "LICENSE"
          )

          mkdir package

          # Copy the addons directory
          cp -r addons package/

          # Copy selected root files if they exist
          for file in "${ROOT_FILES[@]}"; do
            if [ -e "$file" ]; then
              cp -r "$file" package/addons/inspector_notes/
            fi
          done

          (
            cd package
            zip -r "../addons-${TAG}.zip" .
          )

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.version }}"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Automatic release for $TAG"
          fi

      - name: Upload ZIP to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.version }}"
          gh release upload "$TAG" "addons-${TAG}.zip" --clobber